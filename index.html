<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #34495e; font-size: 0.9em; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        input[readonly] { background-color: #ecf0f1; cursor: not-allowed; }
        .results-section { grid-column: span 2; background: #f9f9f9; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn-calc { grid-column: span 2; padding: 15px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 1.1em; cursor: pointer; transition: background 0.3s; }
        .btn-calc:hover { background: #2980b9; }
        .highlight { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Salary Calculation Interface</h2>
    <div class="grid-container">
        <div class="input-group">
            <label>Employee Name</label>
            <input type="text" id="empName" placeholder="Enter Name">
        </div>
        <div class="input-group">
            <label>Post</label>
            <select id="post" onchange="calculateSalary()">
                <option value="">Select Post</option>
                <option value="LP">LP</option>
                <option value="UP">UP</option>
            </select>
        </div>
        <div class="input-group">
            <label>Year</label>
            <input type="number" id="year" value="2024" onchange="calculateSalary()">
        </div>
        <div class="input-group">
            <label>Month</label>
            <select id="month" onchange="calculateSalary()">
                <option value="1">January</option><option value="2">February</option>
                <option value="3">March</option><option value="4">April</option>
                <option value="5">May</option><option value="6">June</option>
                <option value="7">July</option><option value="8">August</option>
                <option value="9">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>
        <div class="input-group">
            <label>No. of days for salary calculation</label>
            <input type="number" id="days" placeholder="e.g. 30" oninput="calculateSalary()">
        </div>
        <div class="input-group">
            <label>Dearness Allowance (A %)</label>
            <input type="number" id="daPercent" placeholder="Enter %" oninput="calculateSalary()">
        </div>

        <div class="results-section">
            <div class="input-group">
                <label>Payband</label>
                <input type="text" id="payband" readonly>
            </div>
            <div class="input-group">
                <label>Grade Pay</label>
                <input type="text" id="gradePay" readonly>
            </div>
            <div class="input-group">
                <label>Basic Pay (PB + GP)</label>
                <input type="text" id="basicPay" readonly>
            </div>
            <div class="input-group">
                <label>DA Amount</label>
                <input type="text" id="daAmount" readonly>
            </div>
            <div class="input-group">
                <label>HRA (7%)</label>
                <input type="text" id="hra" readonly>
            </div>
            <div class="input-group">
                <label>Medical Allowance</label>
                <input type="text" id="medical" readonly>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>Gross Salary</label>
                <input type="text" id="gross" readonly style="font-weight:bold; color: #27ae60;">
            </div>
        </div>

        <div class="results-section" style="background: #fff0f0;">
            <div class="input-group"><label>NPS (10% of BP+DA)</label><input type="text" id="nps" readonly></div>
            <div class="input-group"><label>GIS</label><input type="text" id="gis" value="200" readonly></div>
            <div class="input-group"><label>Ptax</label><input type="text" id="ptax" value="208" readonly></div>
            <div class="input-group"><label>MMLSAY</label><input type="text" id="mmlsay" value="225" readonly></div>
            <div class="input-group" style="grid-column: span 2;">
                <label>Net Deduction</label>
                <input type="text" id="netDeduction" readonly>
            </div>
        </div>

        <div class="input-group" style="grid-column: span 2;">
            <label style="font-size: 1.2em; color: #2c3e50;">NET SALARY</label>
            <input type="text" id="netSalary" readonly style="font-size: 1.5em; background: #2ecc71; color: white;">
        </div>
    </div>
</div>

<script>
function calculateSalary() {
    const post = document.getElementById('post').value;
    const year = parseInt(document.getElementById('year').value);
    const month = parseInt(document.getElementById('month').value);
    const inputDays = parseFloat(document.getElementById('days').value) || 0;
    const daPercent = parseFloat(document.getElementById('daPercent').value) || 0;

    if (!post || !month || !year) return;

    // 1. Get total days in the selected month
    const totalDaysInMonth = new Date(year, month, 0).getDate();
    const ratio = inputDays / totalDaysInMonth;

    // 2. Base Values
    let basePB = 14000;
    let baseGP = (post === 'LP') ? 7400 : (post === 'UP' ? 8700 : 0);

    // 3. Pro-rated Payband and Grade Pay
    let pb = basePB * ratio;
    let gp = baseGP * ratio;
    let basicPay = pb + gp;

    // 4. Allowances
    let da = (daPercent / 100) * basicPay;
    let hra = 0.07 * basicPay;
    let medical = (inputDays >= totalDaysInMonth) ? 600 : (600 * ratio);

    let gross = basicPay + da + hra + medical;

    // 5. Deductions
    let nps = 0.10 * (basicPay + da);
    let gis = 200;
    let ptax = 208;
    let mmlsay = 225;
    let totalDeduction = nps + gis + ptax + mmlsay;

    let netSalary = gross - totalDeduction;

    // Update UI
    document.getElementById('payband').value = pb.toFixed(2);
    document.getElementById('gradePay').value = gp.toFixed(2);
    document.getElementById('basicPay').value = basicPay.toFixed(2);
    document.getElementById('daAmount').value = da.toFixed(2);
    document.getElementById('hra').value = hra.toFixed(2);
    document.getElementById('medical').value = medical.toFixed(2);
    document.getElementById('gross').value = gross.toFixed(2);
    document.getElementById('nps').value = nps.toFixed(2);
    document.getElementById('netDeduction').value = totalDeduction.toFixed(2);
    document.getElementById('netSalary').value = netSalary.toFixed(2);
}
</script>

</body>
</html>
